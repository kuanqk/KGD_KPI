# Витрина (только статика) на порту 8088 — не конфликтует с APPK на :80 и KPI на :8080.
#
# На сервере:
#   sudo mkdir -p /var/www/kgd-hub
#   sudo cp /opt/KGD_KPI/deploy/hub/index.html /var/www/kgd-hub/
#   sudo cp deploy/hub/nginx-hub-8088.conf /etc/nginx/sites-available/kgd-hub.conf
#   sudo ln -sf /etc/nginx/sites-available/kgd-hub.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo ufw allow 8088/tcp && sudo ufw reload
#
# Открыть: http://91.243.71.139:8088/

server {
    listen 8088;
    server_name 91.243.71.139;

    root /var/www/kgd-hub;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}
