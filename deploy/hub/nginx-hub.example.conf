# Мысал: хосттағы nginx — тек витрина (статикалық index.html).
# Файлды /etc/nginx/sites-available/kgd-hub.conf сияқты салып, symlink sites-enabled.
# listen / server_name өз серверіңізге сәйкес келтіріңіз.

server {
    listen 80;
    server_name _;

    root /var/www/kgd-hub;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}

# KPI және APPK өз контейнерлерінің порттарында тұрса, жоғарыдағы витрина тек сілтеме береді.
# Немесе KPI-ны /kpi/ астында бір nginx арқылы проксилеу үшін бөлек server блок қажет.
