name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests (Python 3.12 + PostgreSQL 16)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: kgd_kpi_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpq-dev \
            libcairo2 \
            libpango-1.0-0 \
            libpangocairo-1.0-0 \
            libgdk-pixbuf-2.0-0 \
            libffi-dev \
            fonts-liberation

      - name: Install Python dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Run migrations
        env:
          DJANGO_SETTINGS_MODULE: config.settings.ci
          DJANGO_SECRET_KEY: ci-secret-key-not-for-prod
          REDIS_URL: redis://localhost:6379/0
        run: python manage.py migrate

      - name: Run tests
        env:
          DJANGO_SETTINGS_MODULE: config.settings.ci
          DJANGO_SECRET_KEY: ci-secret-key-not-for-prod
          REDIS_URL: redis://localhost:6379/0
        run: python manage.py test apps/ --verbosity=2

  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: flake8 apps/ --max-line-length=120
