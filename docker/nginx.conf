upstream django {
    server web:8000;
}

upstream frontend {
    server frontend:80;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 50M;

    # SECURE_SSL_REDIRECT в Django: если здесь передать $scheme при доступе по http://IP:8080,
    # Gunicorn отдаёт 301 на https://IP/... без порта — ломается логин. Для контейнерного nginx
    # за ним нет TLS — считаем запрос «безопасным» для приложения (как за внешним TLS-терминатором).
    location /api/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /admin/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /static/ {
        alias /static/;
        expires 30d;
    }

    location /media/ {
        alias /media/;
    }

    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
